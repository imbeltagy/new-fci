services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/new-fci
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongo
      - redis

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - server

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      - server

volumes:
  mongo-data:
  redis-data:
